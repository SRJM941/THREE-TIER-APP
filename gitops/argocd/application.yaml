apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: three-tier-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<YOUR_GITHUB_USERNAME>/<YOUR_REPO_NAME>
    targetRevision: main
    path: gitops
  destination:
    server: https://kubernetes.default.svc
    namespace: three-tier-app
  syncPolicy:
    automated:
      prune: true        # Delete resources that are no longer defined in Git
      selfHeal: true     # Auto-repair drift
    syncOptions:
    - CreateNamespace=true